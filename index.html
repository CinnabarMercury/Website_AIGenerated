<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website_AIGenerated</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #192033;
        background: #f7f4ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 193, 230, 0.88), transparent 28%),
          radial-gradient(circle at 82% 24%, rgba(147, 197, 253, 0.72), transparent 27%),
          radial-gradient(circle at 54% 82%, rgba(187, 247, 208, 0.7), transparent 32%),
          linear-gradient(135deg, #fff7fb 0%, #eef7ff 48%, #fff8dc 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        z-index: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 2px, transparent 2.5px),
          radial-gradient(circle, rgba(255, 255, 255, 0.75) 0 1px, transparent 1.5px);
        background-position:
          0 0,
          36px 52px;
        background-size:
          92px 92px,
          128px 128px;
        mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
        animation: sparkle-drift 14s linear infinite;
      }

      body::after {
        background:
          conic-gradient(from 120deg at 50% 50%, transparent, rgba(255, 255, 255, 0.55), transparent 34%),
          radial-gradient(circle at 50% 50%, transparent 0 40%, rgba(255, 255, 255, 0.58) 41%, transparent 46%);
        opacity: 0.62;
        animation: light-turn 18s linear infinite;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(92vw, 720px);
        padding: 56px 28px;
        text-align: center;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      main::before {
        content: "";
        position: absolute;
        inset: 10px;
        z-index: -1;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.38);
        box-shadow:
          0 24px 70px rgba(111, 91, 166, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 20px;
        color: transparent;
        background: linear-gradient(90deg, #ff5fa2, #6d5dfc 52%, #00a6a6);
        -webkit-background-clip: text;
        background-clip: text;
        font-size: clamp(2.4rem, 7vw, 5rem);
        font-weight: 850;
        text-shadow: 0 14px 34px rgba(109, 93, 252, 0.18);
      }

      p {
        margin: 0;
        min-height: 3.4em;
        font-size: 30px;
        line-height: 1.7;
        color: #34405c;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .intro-cursor {
        display: inline-block;
        width: 0.08em;
        height: 1em;
        margin-left: 0.08em;
        background: currentColor;
        vertical-align: -0.12em;
        animation: cursor-blink 760ms steps(2, end) infinite;
      }

      .attack-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        background:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.08) 0,
            rgba(255, 255, 255, 0.08) 2px,
            transparent 2px,
            transparent 6px
          ),
          radial-gradient(circle at 50% 50%, rgba(255, 0, 64, 0.28), rgba(0, 0, 0, 0.88) 62%);
        color: #f8fafc;
        text-align: center;
      }

      .attack-overlay.is-active {
        opacity: 1;
        animation: warning-flash 420ms steps(2, end) infinite;
      }

      .who-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .who-text {
        position: absolute;
        transform: translate3d(-50%, -50%, 0) rotate(var(--rotation));
        will-change: opacity, transform;
        animation: who-arrive 600ms ease-out both;
      }

      .who-text span {
        display: block;
        color: rgba(148, 163, 184, 0.42);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: var(--font-size);
        font-weight: 700;
        line-height: 1;
        text-shadow:
          0 0 6px currentColor,
          0 0 18px rgba(255, 0, 64, 0.58);
        transform: translateZ(0) scale(var(--min-scale));
        transform-origin: center;
        backface-visibility: hidden;
        will-change: color, filter, transform;
        white-space: nowrap;
        animation: who-pulse var(--pulse-duration) cubic-bezier(0.37, 0, 0.63, 1) var(--pulse-delay) infinite alternate;
      }

      .attack-message {
        position: relative;
        z-index: 1;
        padding: 24px;
        text-shadow: 0 0 16px rgba(255, 0, 64, 0.9);
      }

      .attack-message strong {
        display: block;
        margin-bottom: 12px;
        font-size: clamp(2rem, 8vw, 5rem);
        letter-spacing: 0;
      }

      .attack-message span {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: clamp(0.9rem, 3vw, 1.4rem);
      }

      .is-under-attack main {
        opacity: 0.2;
        transform: scale(0.96) rotate(-1deg);
        animation: shake 90ms linear infinite;
      }

      .is-blackout {
        background: #020617;
      }

      .is-blackout main,
      .is-blackout .attack-overlay,
      .is-blackout .camera-overlay,
      .is-blackout::before,
      .is-blackout::after {
        display: none;
      }

      .camera-overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: none;
        overflow: hidden;
        place-items: center;
        background: #020617;
        color: #fef08a;
      }

      .is-camera-active .camera-overlay {
        display: grid;
      }

      .camera-overlay video,
      .camera-overlay canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .camera-overlay video {
        object-fit: contain;
        transform: scaleX(-1);
      }

      .camera-overlay canvas {
        z-index: 1;
      }

      .camera-message {
        position: relative;
        z-index: 2;
        max-width: min(86vw, 720px);
        padding: 0 20px;
        color: #fef08a;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: clamp(1.8rem, 7vw, 4.8rem);
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
        text-shadow:
          0 0 12px rgba(250, 204, 21, 0.82),
          0 0 30px rgba(255, 0, 64, 0.5);
        opacity: 0;
        transform: scale(0.94);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .is-face-found .camera-message {
        opacity: 1;
        transform: scale(1);
      }

      .readme-tab {
        position: fixed;
        z-index: 20;
        top: 50%;
        left: 50%;
        width: min(82vw, 360px);
        min-height: 190px;
        padding: 18px 20px 22px;
        display: none;
        color: #e5e7eb;
        background: #07111f;
        border: 1px solid rgba(148, 163, 184, 0.42);
        border-radius: 8px;
        box-shadow:
          0 26px 80px rgba(0, 0, 0, 0.62),
          0 0 28px rgba(255, 0, 64, 0.16);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        text-align: left;
        transform: translate(-50%, -50%);
        animation: readme-tab-in 420ms ease-out both;
      }

      .readme-tab::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
        height: 30px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.78);
      }

      .readme-tab h2,
      .readme-tab p {
        position: relative;
        margin: 0;
      }

      .readme-tab h2 {
        padding-top: 40px;
        color: #f8fafc;
        font-size: 18px;
        line-height: 1.2;
      }

      .readme-tab p {
        margin-top: 20px;
        min-height: 0;
        color: #fca5a5;
        font-size: 20px;
        line-height: 1.8;
        text-shadow: 0 0 14px rgba(255, 0, 64, 0.38);
      }

      .access-code {
        position: relative;
        margin-top: 18px;
        padding: 10px 12px;
        color: #f8fafc;
        background: #020617;
        border: 1px solid rgba(248, 113, 113, 0.45);
        border-radius: 6px;
        font-size: 24px;
        letter-spacing: 0.18em;
        text-align: center;
        text-shadow: 0 0 16px rgba(248, 113, 113, 0.52);
      }

      .code-form {
        position: relative;
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .code-form input {
        min-width: 0;
        flex: 1;
        padding: 10px 12px;
        color: #e5e7eb;
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.48);
        border-radius: 6px;
        font: inherit;
        font-size: 16px;
      }

      .code-form input:focus {
        border-color: #f87171;
        outline: none;
        box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.18);
      }

      .code-form button {
        padding: 10px 14px;
        color: #020617;
        background: #fca5a5;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .code-error {
        position: relative;
        min-height: 1.4em;
        margin-top: 12px;
        color: #ff3b3b;
        font-size: 14px;
        line-height: 1.4;
        text-shadow: 0 0 12px rgba(255, 0, 0, 0.55);
      }

      .loading-status {
        position: relative;
        display: none;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
        color: #bfdbfe;
        font-size: 14px;
        line-height: 1.4;
        text-shadow: 0 0 12px rgba(96, 165, 250, 0.42);
      }

      .loading-status::before {
        content: "";
        width: 14px;
        height: 14px;
        border: 2px solid rgba(191, 219, 254, 0.24);
        border-top-color: #bfdbfe;
        border-radius: 50%;
        animation: loading-spin 760ms linear infinite;
      }

      .is-readme-visible .readme-tab {
        display: block;
      }

      .is-restoring .code-form,
      .is-restoring .code-error {
        display: none;
      }

      .is-restoring .loading-status {
        display: flex;
      }

      @keyframes warning-flash {
        0% {
          filter: hue-rotate(0deg);
        }

        100% {
          filter: hue-rotate(35deg);
        }
      }

      @keyframes shake {
        0% {
          transform: translate(0, 0) scale(0.96) rotate(-1deg);
        }

        50% {
          transform: translate(4px, -3px) scale(0.96) rotate(1deg);
        }

        100% {
          transform: translate(-3px, 2px) scale(0.96) rotate(-1deg);
        }
      }

      @keyframes sparkle-drift {
        0% {
          transform: translate3d(0, 0, 0);
        }

        100% {
          transform: translate3d(90px, -90px, 0);
        }
      }

      @keyframes light-turn {
        0% {
          transform: rotate(0deg) scale(1);
        }

        100% {
          transform: rotate(360deg) scale(1.05);
        }
      }

      @keyframes cursor-blink {
        0% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }

      @keyframes readme-tab-in {
        0% {
          opacity: 0;
          transform: translate(-50%, -46%) scale(0.92);
        }

        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      @keyframes loading-spin {
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes who-arrive {
        0% {
          opacity: 0;
          transform: translate3d(-50%, -50%, 0) scale(0.4) rotate(var(--rotation));
        }

        100% {
          opacity: 1;
          transform: translate3d(-50%, -50%, 0) scale(1) rotate(var(--rotation));
        }
      }

      @keyframes who-pulse {
        0% {
          color: rgba(148, 163, 184, 0.42);
          filter: brightness(0.72) drop-shadow(0 0 4px rgba(255, 0, 64, 0.28));
          transform: translateZ(0) scale(var(--min-scale));
        }

        100% {
          color: rgba(255, 255, 255, 0.98);
          filter: brightness(1.35) drop-shadow(0 0 18px rgba(255, 0, 64, 0.82));
          transform: translateZ(0) scale(var(--max-scale));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Website_AIGenerated</h1>
      <p id="intro-text" aria-label="こんにちは。ここはAIが作ってくれた私の世界 君はどうやって入ってきたんだい？"></p>
    </main>
    <div class="attack-overlay" aria-hidden="true">
      <div class="who-layer"></div>
      <div class="attack-message">
        <strong>WARNING</strong>
        <span>SYSTEM ACCESS DETECTED</span>
      </div>
    </div>
    <div class="camera-overlay" aria-hidden="true">
      <video id="camera-video" autoplay muted playsinline></video>
      <canvas id="face-canvas"></canvas>
      <div class="camera-message">君は誰？<br>私じゃないね</div>
    </div>
    <section class="readme-tab" aria-label="README2">
      <h2>Website_AIGenerated</h2>
      <p>
        エラー<br>
        下記の数字を入力してください
      </p>
      <div class="access-code" id="access-code"></div>
      <form class="code-form" id="code-form">
        <input id="code-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off" aria-label="8桁の数字">
        <button type="submit">Enter</button>
      </form>
      <div class="code-error" id="code-error" aria-live="polite"></div>
      <div class="loading-status" aria-live="polite">サイトを再表示しています</div>
    </section>
    <script>
      var attackTimer = null;
      var blackoutTimer = null;
      var readmeTimer = null;
      var restoreTimer = null;
      var faceScanTimer = null;
      var faceDetectFrame = null;
      var faceStream = null;
      var accessCode = "";

      startSite();
      document.getElementById("code-form").addEventListener("submit", submitAccessCode);

      function startSite() {
        window.clearTimeout(attackTimer);
        window.clearTimeout(blackoutTimer);
        window.clearTimeout(readmeTimer);
        window.clearTimeout(restoreTimer);
        window.clearTimeout(faceScanTimer);
        window.cancelAnimationFrame(faceDetectFrame);
        stopCamera();

        document.body.classList.remove("is-under-attack", "is-blackout", "is-readme-visible", "is-restoring", "is-camera-active", "is-face-found");
        document.querySelector(".attack-overlay").classList.remove("is-active");
        document.querySelector(".who-layer").textContent = "";
        clearFaceCanvas();
        document.getElementById("code-input").value = "";
        document.getElementById("code-input").disabled = false;
        document.querySelector(".code-form button").disabled = false;
        document.getElementById("code-error").textContent = "";
        generateAccessCode();
        revealIntroText();

        attackTimer = window.setTimeout(function () {
          document.body.classList.add("is-under-attack");
          document.querySelector(".attack-overlay").classList.add("is-active");
          fillScreenWithQuestions();
        }, 5000);

        blackoutTimer = window.setTimeout(function () {
          beginFaceScan();
        }, 10000);
      }

      function blackoutToReadme() {
        stopCamera();
        clearFaceCanvas();
        document.body.classList.remove("is-camera-active", "is-face-found");
        document.body.classList.add("is-blackout");

        readmeTimer = window.setTimeout(function () {
          document.body.classList.add("is-readme-visible");
          document.getElementById("code-input").focus();
        }, 3000);
      }

      function stopCamera() {
        if (faceStream) {
          faceStream.getTracks().forEach(function (track) {
            track.stop();
          });
        }

        faceStream = null;
        document.getElementById("camera-video").srcObject = null;
      }

      function clearFaceCanvas() {
        var canvas = document.getElementById("face-canvas");
        canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
      }

      function beginFaceScan() {
        var video = document.getElementById("camera-video");

        document.body.classList.add("is-camera-active");

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          faceScanTimer = window.setTimeout(blackoutToReadme, 1800);
          return;
        }

        navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        }).then(function (stream) {
          faceStream = stream;
          video.srcObject = stream;

          return video.play();
        }).then(function () {
          if ("FaceDetector" in window) {
            detectFaces();
          } else {
            faceScanTimer = window.setTimeout(blackoutToReadme, 2600);
          }
        }).catch(function () {
          faceScanTimer = window.setTimeout(blackoutToReadme, 1800);
        });
      }

      function detectFaces() {
        var detector = new window.FaceDetector({ fastMode: true, maxDetectedFaces: 4 });
        var video = document.getElementById("camera-video");
        var foundFace = false;

        function scan() {
          detector.detect(video).then(function (faces) {
            drawFaceBoxes(faces, video);

            if (faces.length > 0 && !foundFace) {
              foundFace = true;
              document.body.classList.add("is-face-found");
              faceScanTimer = window.setTimeout(blackoutToReadme, 1800);
              return;
            }

            if (!foundFace) {
              faceDetectFrame = window.requestAnimationFrame(scan);
            }
          }).catch(function () {
            faceScanTimer = window.setTimeout(blackoutToReadme, 1800);
          });
        }

        scan();
      }

      function drawFaceBoxes(faces, video) {
        var canvas = document.getElementById("face-canvas");
        var context = canvas.getContext("2d");
        var videoWidth = video.videoWidth || 1;
        var videoHeight = video.videoHeight || 1;
        var scale = Math.min(window.innerWidth / videoWidth, window.innerHeight / videoHeight);
        var renderedWidth = videoWidth * scale;
        var renderedHeight = videoHeight * scale;
        var offsetX = (window.innerWidth - renderedWidth) / 2;
        var offsetY = (window.innerHeight - renderedHeight) / 2;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.strokeStyle = "#facc15";
        context.lineWidth = 5;
        context.shadowColor = "rgba(250, 204, 21, 0.9)";
        context.shadowBlur = 18;

        faces.forEach(function (face) {
          var box = face.boundingBox;
          var x = offsetX + (videoWidth - box.x - box.width) * scale;
          var y = offsetY + box.y * scale;

          context.strokeRect(x, y, box.width * scale, box.height * scale);
        });
      }

      function generateAccessCode() {
        accessCode = String(Math.floor(Math.random() * 100000000)).padStart(8, "0");
        document.getElementById("access-code").textContent = accessCode;
      }

      function submitAccessCode(event) {
        event.preventDefault();

        if (document.getElementById("code-input").value === accessCode) {
          document.body.classList.add("is-restoring");
          document.getElementById("code-input").disabled = true;
          document.querySelector(".code-form button").disabled = true;
          document.getElementById("code-error").textContent = "";
          restoreTimer = window.setTimeout(startSite, 3000);
          return;
        }

        document.getElementById("code-error").textContent = "入力が違います。もう一度やり直してください。";
      }

      function revealIntroText() {
        var intro = document.getElementById("intro-text");
        var parts = [
          "こんにちは。ここはAIが作ってくれた私の世界",
          "\n",
          "君はどうやって入ってきたんだい？"
        ];
        var text = parts.join("");
        var duration = 3000;
        var index = 0;
        var cursor = document.createElement("span");
        var interval = duration / text.length;

        intro.textContent = "";
        cursor.className = "intro-cursor";

        function appendCharacter() {
          if (index >= text.length) {
            cursor.remove();
            return;
          }

          if (text.charAt(index) === "\n") {
            intro.appendChild(document.createElement("br"));
          } else {
            intro.appendChild(document.createTextNode(text.charAt(index)));
          }

          index += 1;
          intro.appendChild(cursor);
          window.setTimeout(appendCharacter, interval);
        }

        intro.appendChild(cursor);
        appendCharacter();
      }

      function fillScreenWithQuestions() {
        var layer = document.querySelector(".who-layer");
        var start = Date.now();
        var duration = 5000;
        var questions = [
          { text: "Who are you?", direction: "ltr" },
          { text: "Qui es-tu ?", direction: "ltr" },
          { text: "Wer bist du?", direction: "ltr" },
          { text: "¿Quién eres?", direction: "ltr" },
          { text: "من أنت؟", direction: "rtl" },
          { text: "Кто ты?", direction: "ltr" },
          { text: "你是谁？", direction: "ltr" },
          { text: "너는 누구야?", direction: "ltr" }
        ];
        var questionQueue = [];

        function nextQuestion() {
          if (questionQueue.length === 0) {
            questionQueue = questions.slice().sort(function () {
              return Math.random() - 0.5;
            });
          }

          return questionQueue.pop();
        }

        function addQuestion() {
          var elapsed = Date.now() - start;
          var progress = Math.min(elapsed / duration, 1);
          var count = 1 + Math.floor(progress * 9);

          for (var i = 0; i < count; i += 1) {
            var question = document.createElement("span");
            var text = document.createElement("span");
            var next = nextQuestion();
            question.className = "who-text";
            text.textContent = next.text;
            text.dir = next.direction;
            question.style.left = Math.random() * 100 + "vw";
            question.style.top = Math.random() * 100 + "vh";
            question.style.setProperty("--rotation", Math.random() * 40 - 20 + "deg");
            question.style.setProperty("--font-size", Math.random() * 42 + 16 + "px");
            question.style.setProperty("--min-scale", Math.random() * 0.35 + 0.65);
            question.style.setProperty("--max-scale", Math.random() * 1.25 + 1.2);
            question.style.setProperty("--pulse-duration", Math.random() * 1600 + 1600 + "ms");
            question.style.setProperty("--pulse-delay", Math.random() * 500 + "ms");
            question.appendChild(text);
            layer.appendChild(question);
          }

          if (progress < 1) {
            window.setTimeout(addQuestion, Math.max(55, 300 - progress * 250));
          }
        }

        addQuestion();
      }
    </script>
  </body>
</html>
