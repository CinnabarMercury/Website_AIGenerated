<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website_AIGenerated</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #192033;
        background: #f7f4ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(255, 193, 230, 0.88), transparent 28%),
          radial-gradient(circle at 82% 24%, rgba(147, 197, 253, 0.72), transparent 27%),
          radial-gradient(circle at 54% 82%, rgba(187, 247, 208, 0.7), transparent 32%),
          linear-gradient(135deg, #fff7fb 0%, #eef7ff 48%, #fff8dc 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        z-index: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 2px, transparent 2.5px),
          radial-gradient(circle, rgba(255, 255, 255, 0.75) 0 1px, transparent 1.5px);
        background-position:
          0 0,
          36px 52px;
        background-size:
          92px 92px,
          128px 128px;
        mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
        animation: sparkle-drift 14s linear infinite;
      }

      body::after {
        background:
          conic-gradient(from 120deg at 50% 50%, transparent, rgba(255, 255, 255, 0.55), transparent 34%),
          radial-gradient(circle at 50% 50%, transparent 0 40%, rgba(255, 255, 255, 0.58) 41%, transparent 46%);
        opacity: 0.62;
        animation: light-turn 18s linear infinite;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(92vw, 720px);
        padding: 56px 28px;
        text-align: center;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      main::before {
        content: "";
        position: absolute;
        inset: 10px;
        z-index: -1;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.38);
        box-shadow:
          0 24px 70px rgba(111, 91, 166, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 20px;
        color: transparent;
        background: linear-gradient(90deg, #ff5fa2, #6d5dfc 52%, #00a6a6);
        -webkit-background-clip: text;
        background-clip: text;
        font-size: clamp(2.4rem, 7vw, 5rem);
        font-weight: 850;
        text-shadow: 0 14px 34px rgba(109, 93, 252, 0.18);
      }

      p {
        margin: 0;
        min-height: 3.4em;
        font-size: 30px;
        line-height: 1.7;
        color: #34405c;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .intro-cursor {
        display: inline-block;
        width: 0.08em;
        height: 1em;
        margin-left: 0.08em;
        background: currentColor;
        vertical-align: -0.12em;
        animation: cursor-blink 760ms steps(2, end) infinite;
      }

      .attack-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        background:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.08) 0,
            rgba(255, 255, 255, 0.08) 2px,
            transparent 2px,
            transparent 6px
          ),
          radial-gradient(circle at 50% 50%, rgba(255, 0, 64, 0.28), rgba(0, 0, 0, 0.88) 62%);
        color: #f8fafc;
        text-align: center;
      }

      .attack-overlay.is-active {
        opacity: 1;
        animation: warning-flash 420ms steps(2, end) infinite;
      }

      .who-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .who-text {
        position: absolute;
        transform: translate3d(-50%, -50%, 0) rotate(var(--rotation));
        will-change: opacity, transform;
        animation: who-arrive 600ms ease-out both;
      }

      .who-text span {
        display: block;
        color: rgba(148, 163, 184, 0.42);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: var(--font-size);
        font-weight: 700;
        line-height: 1;
        text-shadow:
          0 0 6px currentColor,
          0 0 18px rgba(255, 0, 64, 0.58);
        transform: translateZ(0) scale(var(--min-scale));
        transform-origin: center;
        backface-visibility: hidden;
        will-change: color, filter, transform;
        white-space: nowrap;
        animation: who-pulse var(--pulse-duration) cubic-bezier(0.37, 0, 0.63, 1) var(--pulse-delay) infinite alternate;
      }

      .attack-message {
        position: relative;
        z-index: 1;
        padding: 24px;
        text-shadow: 0 0 16px rgba(255, 0, 64, 0.9);
      }

      .attack-message strong {
        display: block;
        margin-bottom: 12px;
        font-size: clamp(2rem, 8vw, 5rem);
        letter-spacing: 0;
      }

      .attack-message span {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: clamp(0.9rem, 3vw, 1.4rem);
      }

      .is-under-attack main {
        opacity: 0.2;
        transform: scale(0.96) rotate(-1deg);
        animation: shake 90ms linear infinite;
      }

      .is-closed {
        background: #020617;
      }

      .is-closed main,
      .is-closed .attack-overlay,
      .is-closed::before,
      .is-closed::after {
        display: none;
      }

      .closed-message {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        place-items: center;
        padding: 24px;
        color: #e5e7eb;
        background: #020617;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        text-align: center;
      }

      .is-closed .closed-message {
        display: grid;
      }

      @keyframes warning-flash {
        0% {
          filter: hue-rotate(0deg);
        }

        100% {
          filter: hue-rotate(35deg);
        }
      }

      @keyframes shake {
        0% {
          transform: translate(0, 0) scale(0.96) rotate(-1deg);
        }

        50% {
          transform: translate(4px, -3px) scale(0.96) rotate(1deg);
        }

        100% {
          transform: translate(-3px, 2px) scale(0.96) rotate(-1deg);
        }
      }

      @keyframes sparkle-drift {
        0% {
          transform: translate3d(0, 0, 0);
        }

        100% {
          transform: translate3d(90px, -90px, 0);
        }
      }

      @keyframes light-turn {
        0% {
          transform: rotate(0deg) scale(1);
        }

        100% {
          transform: rotate(360deg) scale(1.05);
        }
      }

      @keyframes cursor-blink {
        0% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }

      @keyframes who-arrive {
        0% {
          opacity: 0;
          transform: translate3d(-50%, -50%, 0) scale(0.4) rotate(var(--rotation));
        }

        100% {
          opacity: 1;
          transform: translate3d(-50%, -50%, 0) scale(1) rotate(var(--rotation));
        }
      }

      @keyframes who-pulse {
        0% {
          color: rgba(148, 163, 184, 0.42);
          filter: brightness(0.72) drop-shadow(0 0 4px rgba(255, 0, 64, 0.28));
          transform: translateZ(0) scale(var(--min-scale));
        }

        100% {
          color: rgba(255, 255, 255, 0.98);
          filter: brightness(1.35) drop-shadow(0 0 18px rgba(255, 0, 64, 0.82));
          transform: translateZ(0) scale(var(--max-scale));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Website_AIGenerated</h1>
      <p id="intro-text" aria-label="こんにちは。ここはAIが作ってくれた私の世界 君はどうやって入ってきたんだい？"></p>
    </main>
    <div class="attack-overlay" aria-hidden="true">
      <div class="who-layer"></div>
      <div class="attack-message">
        <strong>WARNING</strong>
        <span>SYSTEM ACCESS DETECTED</span>
      </div>
    </div>
    <div class="closed-message">SESSION CLOSED</div>
    <script>
      revealIntroText();

      window.setTimeout(function () {
        document.body.classList.add("is-under-attack");
        document.querySelector(".attack-overlay").classList.add("is-active");
        fillScreenWithQuestions();
      }, 5000);

      window.setTimeout(function () {
        document.body.classList.add("is-closed");
        window.close();
      }, 10000);

      function revealIntroText() {
        var intro = document.getElementById("intro-text");
        var parts = [
          "こんにちは。ここはAIが作ってくれた私の世界",
          "\n",
          "君はどうやって入ってきたんだい？"
        ];
        var text = parts.join("");
        var duration = 3000;
        var index = 0;
        var cursor = document.createElement("span");
        var interval = duration / text.length;

        cursor.className = "intro-cursor";

        function appendCharacter() {
          if (index >= text.length) {
            cursor.remove();
            return;
          }

          if (text.charAt(index) === "\n") {
            intro.appendChild(document.createElement("br"));
          } else {
            intro.appendChild(document.createTextNode(text.charAt(index)));
          }

          index += 1;
          intro.appendChild(cursor);
          window.setTimeout(appendCharacter, interval);
        }

        intro.appendChild(cursor);
        appendCharacter();
      }

      function fillScreenWithQuestions() {
        var layer = document.querySelector(".who-layer");
        var start = Date.now();
        var duration = 5000;
        var questions = [
          { text: "Qui es-tu ?", direction: "ltr" },
          { text: "Wer bist du?", direction: "ltr" },
          { text: "¿Quién eres?", direction: "ltr" },
          { text: "من أنت؟", direction: "rtl" },
          { text: "Кто ты?", direction: "ltr" },
          { text: "你是谁？", direction: "ltr" },
          { text: "너는 누구야?", direction: "ltr" }
        ];
        var questionQueue = [];

        function nextQuestion() {
          if (questionQueue.length === 0) {
            questionQueue = questions.slice().sort(function () {
              return Math.random() - 0.5;
            });
          }

          return questionQueue.pop();
        }

        function addQuestion() {
          var elapsed = Date.now() - start;
          var progress = Math.min(elapsed / duration, 1);
          var count = 1 + Math.floor(progress * 9);

          for (var i = 0; i < count; i += 1) {
            var question = document.createElement("span");
            var text = document.createElement("span");
            var next = nextQuestion();
            question.className = "who-text";
            text.textContent = next.text;
            text.dir = next.direction;
            question.style.left = Math.random() * 100 + "vw";
            question.style.top = Math.random() * 100 + "vh";
            question.style.setProperty("--rotation", Math.random() * 40 - 20 + "deg");
            question.style.setProperty("--font-size", Math.random() * 42 + 16 + "px");
            question.style.setProperty("--min-scale", Math.random() * 0.35 + 0.65);
            question.style.setProperty("--max-scale", Math.random() * 1.25 + 1.2);
            question.style.setProperty("--pulse-duration", Math.random() * 1600 + 1600 + "ms");
            question.style.setProperty("--pulse-delay", Math.random() * 500 + "ms");
            question.appendChild(text);
            layer.appendChild(question);
          }

          if (progress < 1) {
            window.setTimeout(addQuestion, Math.max(55, 300 - progress * 250));
          }
        }

        addQuestion();
      }
    </script>
  </body>
</html>
