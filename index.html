<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Website_AIGenerated</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #f7f8fa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      main {
        width: min(92vw, 720px);
        padding: 48px 24px;
        text-align: center;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 700;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
        line-height: 1.7;
        color: #4b5563;
      }

      .attack-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        background:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.08) 0,
            rgba(255, 255, 255, 0.08) 2px,
            transparent 2px,
            transparent 6px
          ),
          radial-gradient(circle at 50% 50%, rgba(255, 0, 64, 0.28), rgba(0, 0, 0, 0.88) 62%);
        color: #f8fafc;
        text-align: center;
      }

      .attack-overlay.is-active {
        opacity: 1;
        animation: warning-flash 420ms steps(2, end) infinite;
      }

      .who-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .who-text {
        position: absolute;
        color: rgba(255, 255, 255, 0.88);
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: clamp(0.95rem, 3vw, 1.85rem);
        font-weight: 700;
        line-height: 1;
        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.8),
          0 0 18px rgba(255, 0, 64, 0.9);
        white-space: nowrap;
        transform: translate(-50%, -50%) rotate(var(--rotation));
        animation: who-arrive 600ms ease-out both;
      }

      .attack-message {
        position: relative;
        z-index: 1;
        padding: 24px;
        text-shadow: 0 0 16px rgba(255, 0, 64, 0.9);
      }

      .attack-message strong {
        display: block;
        margin-bottom: 12px;
        font-size: clamp(2rem, 8vw, 5rem);
        letter-spacing: 0;
      }

      .attack-message span {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: clamp(0.9rem, 3vw, 1.4rem);
      }

      .is-under-attack main {
        opacity: 0.2;
        transform: scale(0.96) rotate(-1deg);
        animation: shake 90ms linear infinite;
      }

      .is-closed {
        background: #020617;
      }

      .is-closed main,
      .is-closed .attack-overlay {
        display: none;
      }

      .closed-message {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 24px;
        color: #e5e7eb;
        background: #020617;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        text-align: center;
      }

      .is-closed .closed-message {
        display: grid;
      }

      @keyframes warning-flash {
        0% {
          filter: hue-rotate(0deg);
        }

        100% {
          filter: hue-rotate(35deg);
        }
      }

      @keyframes shake {
        0% {
          transform: translate(0, 0) scale(0.96) rotate(-1deg);
        }

        50% {
          transform: translate(4px, -3px) scale(0.96) rotate(1deg);
        }

        100% {
          transform: translate(-3px, 2px) scale(0.96) rotate(-1deg);
        }
      }

      @keyframes who-arrive {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.4) rotate(var(--rotation));
        }

        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1) rotate(var(--rotation));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Website_AIGenerated</h1>
      <p>
        こんにちは。ここはAIが作ってくれた私の世界<br>
        君はどうやって入ってきたんだい？
      </p>
    </main>
    <div class="attack-overlay" aria-hidden="true">
      <div class="who-layer"></div>
      <div class="attack-message">
        <strong>WARNING</strong>
        <span>SYSTEM ACCESS DETECTED</span>
      </div>
    </div>
    <div class="closed-message">SESSION CLOSED</div>
    <script>
      window.setTimeout(function () {
        document.body.classList.add("is-under-attack");
        document.querySelector(".attack-overlay").classList.add("is-active");
        fillScreenWithQuestions();
      }, 5000);

      window.setTimeout(function () {
        document.body.classList.add("is-closed");
        window.close();
      }, 10000);

      function fillScreenWithQuestions() {
        var layer = document.querySelector(".who-layer");
        var start = Date.now();
        var duration = 5000;

        function addQuestion() {
          var elapsed = Date.now() - start;
          var progress = Math.min(elapsed / duration, 1);
          var count = 1 + Math.floor(progress * 9);

          for (var i = 0; i < count; i += 1) {
            var question = document.createElement("span");
            question.className = "who-text";
            question.textContent = "Who are you?";
            question.style.left = Math.random() * 100 + "vw";
            question.style.top = Math.random() * 100 + "vh";
            question.style.setProperty("--rotation", Math.random() * 40 - 20 + "deg");
            layer.appendChild(question);
          }

          if (progress < 1) {
            window.setTimeout(addQuestion, Math.max(55, 300 - progress * 250));
          }
        }

        addQuestion();
      }
    </script>
  </body>
</html>
